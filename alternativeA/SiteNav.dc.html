<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="_ds/modernist-b99051ef-2a97-41c7-a0ab-38a16645b3b4/styles.css">
<script src="_ds/modernist-b99051ef-2a97-41c7-a0ab-38a16645b3b4/_ds_bundle.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root { --edge: clamp(20px, 5vw, 72px); }
.site-nav { position: sticky; top: 0; z-index: 50; background: var(--color-bg); font-family: var(--font-body); }
.site-nav__bar { display: flex; align-items: center; gap: clamp(16px, 2.4vw, 36px); padding: 18px var(--edge); border-bottom: 2px solid var(--color-divider); }
.site-nav__brand { display: flex; flex-direction: column; line-height: 1; text-decoration: none; color: var(--color-text); margin-right: auto; }
.site-nav__mark { font-family: var(--font-heading); font-weight: 800; font-size: 22px; letter-spacing: -0.01em; }
.site-nav__mark b { color: var(--color-accent); }
.site-nav__sub { font-size: 9px; letter-spacing: 0.34em; text-transform: uppercase; margin-top: 5px; color: color-mix(in srgb, var(--color-text) 60%, transparent); }
.site-nav__links { display: flex; align-items: center; gap: clamp(14px, 1.8vw, 26px); }
.site-nav__links a { font-size: 12.5px; letter-spacing: 0.06em; text-transform: uppercase; text-decoration: none; color: color-mix(in srgb, var(--color-text) 72%, transparent); padding: 6px 0; }
.site-nav__links a:hover { color: var(--color-text); }
.site-nav__links a[aria-current="page"] { color: var(--color-accent); box-shadow: inset 0 -2px 0 var(--color-accent); }
.site-nav__cta { margin-left: 6px; }
.site-nav__burger { display: none; }
@media (max-width: 900px) {
  .site-nav__links, .site-nav__cta { display: none; }
  .site-nav__burger { display: inline-flex; }
  .site-nav[data-open="true"] .site-nav__links { display: flex; flex-direction: column; align-items: flex-start; gap: 0; padding: 8px var(--edge) 20px; border-bottom: 2px solid var(--color-divider); }
  .site-nav[data-open="true"] .site-nav__links a { width: 100%; padding: 13px 0; border-top: 1px solid var(--color-divider); }
  .site-nav[data-open="true"] .site-nav__cta { display: inline-flex; margin: 12px var(--edge) 0; }
}
</style>
</helmet>
<nav class="site-nav" data-open="{{ openStr }}">
  <div class="site-nav__bar">
    <a class="site-nav__brand" href="Home.dc.html">
      <span class="site-nav__mark">DNA<b>.</b>LEGAL</span>
      <span class="site-nav__sub">Advocates · Solicitors</span>
    </a>
    <div class="site-nav__links">
      <a href="Home.dc.html" aria-current="{{ curHome }}">Home</a>
      <a href="About.dc.html" aria-current="{{ curAbout }}">Firm</a>
      <a href="Practice.dc.html" aria-current="{{ curPractice }}">Practice</a>
      <a href="Team.dc.html" aria-current="{{ curTeam }}">Team</a>
      <a href="Clients.dc.html" aria-current="{{ curClients }}">Clients</a>
      <a href="Insights.dc.html" aria-current="{{ curInsights }}">Insights</a>
      <a href="Contact.dc.html" aria-current="{{ curContact }}">Contact</a>
    </div>
    <a class="btn btn-primary site-nav__cta" href="Contact.dc.html">Contact us</a>
    <button type="button" class="btn btn-secondary btn-icon site-nav__burger" aria-label="Menu" onClick="{{ toggle }}">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
    </button>
  </div>
</nav>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;84px&quot;},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;home&quot;,&quot;about&quot;,&quot;practice&quot;,&quot;team&quot;,&quot;clients&quot;,&quot;insights&quot;,&quot;contact&quot;],&quot;default&quot;:&quot;home&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state = { open: false };
  renderVals() {
    const a = this.props.active;
    const cur = (k) => (a === k ? "page" : undefined);
    return {
      openStr: this.state.open ? "true" : "false",
      toggle: () => this.setState(s => ({ open: !s.open })),
      curHome: cur("home"), curAbout: cur("about"), curPractice: cur("practice"),
      curTeam: cur("team"), curClients: cur("clients"), curInsights: cur("insights"),
      curContact: cur("contact"),
    };
  }
}
</script>
</body>
</html>
